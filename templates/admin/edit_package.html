{% extends 'admin_base.html' %}

{% block title %}Edit Package - Admin Console{% endblock %}

{% block breadcrumb %}Edit Travel Deal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card-simple">
            <h2 class="fw-bold mb-3">Update Package</h2>
            <p class="text-muted mb-4">Modify the information for <span class="text-primary fw-bold">{{ package.title
                    }}</span>.</p>

            <form action="{{ url_for('admin.edit_package', id=package.id) }}" method="POST">
                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label small fw-bold">Package Title</label>
                        <input type="text" name="title" value="{{ package.title }}" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Destination</label>
                        <input type="text" name="destination" value="{{ package.destination }}" class="form-control"
                            required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Duration</label>
                        <input type="text" name="duration" value="{{ package.duration }}" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Price (₹)</label>
                        <input type="number" step="1" name="price" value="{{ package.price }}" class="form-control"
                            required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Total Slots</label>
                        <input type="number" name="total_slots" value="{{ package.total_slots }}" class="form-control"
                            required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Available Slots</label>
                        <input type="number" name="available_slots" value="{{ package.available_slots }}"
                            class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Start Date</label>
                        <input type="datetime-local" name="start_date"
                            value="{{ package.booking_start_date.strftime('%Y-%m-%dT%H:%M') }}" class="form-control"
                            required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold">End Date</label>
                        <input type="datetime-local" name="end_date"
                            value="{{ package.booking_end_date.strftime('%Y-%m-%dT%H:%M') }}" class="form-control"
                            required>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label small fw-bold">Image URL</label>
                        <input type="url" name="image_url" value="{{ package.image_url }}" class="form-control"
                            required>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label small fw-bold">Description</label>
                        <textarea name="description" class="form-control" rows="3"
                            required>{{ package.description }}</textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{{ url_for('admin.manage_packages') }}"
                        class="btn btn-outline-secondary btn-sm px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary btn-sm px-4">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
