{% extends 'base.html' %}

{% block title %}Reset Password - Safar{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    body {
        background-color: #fff9f6;
        font-family: 'Outfit', sans-serif;
    }

    .navbar {
        background: transparent !important;
        border-bottom: none;
        box-shadow: none;
    }

    .auth-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 100px);
        padding: 20px;
    }

    .auth-card {
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        display: flex;
        width: 100%;
        max-width: 900px;
        min-height: 600px;
    }

    .auth-sidebar {
        flex: 0.9;
        background: url("{{ url_for('static', filename='images/auth_side.png') }}") no-repeat center center;
        background-size: cover;
        position: relative;
    }

    @media (max-width: 768px) {
        .auth-sidebar {
            display: none;
        }
    }

    .auth-content {
        flex: 1.1;
        padding: 40px 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .auth-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 2.2rem;
        color: #1a1a1a;
        margin-bottom: 10px;
    }

    .auth-header p {
        color: #8c8c8c;
        font-size: 0.95rem;
        margin-bottom: 30px;
    }

    .form-label {
        color: #a0a0a0;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
        display: block;
    }

    .input-group-custom {
        position: relative;
        background-color: #ecf3ff;
        border-radius: 12px;
        display: flex;
        align-items: center;
        padding: 0 18px;
        height: 48px;
        margin-bottom: 20px;
        transition: all 0.2s ease;
    }

    .input-group-custom:focus-within {
        background-color: #e2eeff;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }

    .input-group-custom i {
        color: #94a3b8;
        width: 18px;
        height: 18px;
        margin-right: 12px;
        flex-shrink: 0;
    }

    .form-control-custom {
        flex: 1;
        background: transparent !important;
        border: none !important;
        padding: 0 !important;
        font-size: 0.95rem;
        color: #1e293b;
        height: 100%;
        outline: none !important;
    }

    .form-control-otp {
        letter-spacing: 15px;
        text-align: center;
        padding-left: 15px;
        font-weight: 700;
        font-size: 1.2rem;
    }

    .btn-update {
        background-color: #718d71;
        color: white;
        border: none;
        border-radius: 30px;
        padding: 14px;
        font-weight: 600;
        font-size: 1rem;
        width: 100%;
        margin-top: 15px;
        cursor: pointer;
        transition: background-color 0.2s;
        box-shadow: 0 4px 12px rgba(113, 141, 113, 0.2);
    }

    .btn-update:hover {
        background-color: #5f7a5f;
    }

    .content-main {
        padding: 0 !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <!-- Left: Image Sidebar -->
        <div class="auth-sidebar"></div>

        <!-- Right: Form Content -->
        <div class="auth-content">
            <div class="auth-header">
                <h1>Set Password</h1>
                <p>Complete your reset by verifying the code and choosing a new password.</p>
            </div>

            <form action="{{ url_for('auth.reset_password') }}" method="POST">
                
                <label class="form-label">Verification OTP</label>
                <div class="input-group-custom">
                    <i data-lucide="hash"></i>
                    <input type="text" name="otp" class="form-control-custom form-control-otp" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">New Password</label>
                        <div class="input-group-custom">
                            <i data-lucide="lock"></i>
                            <input type="password" name="new_password" id="passwordInput" class="form-control-custom" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-group-custom">
                            <i data-lucide="shield-check"></i>
                            <input type="password" name="confirm_password" id="confirmPasswordInput" class="form-control-custom" placeholder="••••••••" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-update">Update Password</button>
            </form>

            <a href="{{ url_for('auth.login') }}" class="back-home text-decoration-none text-muted small mt-4 d-inline-block">
                <i data-lucide="arrow-left" size="14"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    lucide.createIcons();
    const togglePassword = (inputId) => {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
    };
</script>
{% endblock %}
