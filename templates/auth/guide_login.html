{% extends 'base.html' %}

{% block title %}Guide Login - Safar{% endblock %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-5">
        <div class="card-simple">
            <h2 class="fw-bold mb-3 text-center text-success">Guide Login</h2>
            <p class="text-muted text-center mb-4">Welcome back to Safar Guides!</p>
            
            <form action="{{ url_for('guide.login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 0.5px; color: #64748b;">Email Address</label>
                    <input type="email" name="email" class="form-control rounded-3" placeholder="guide@safar.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 0.5px; color: #64748b;">Password</label>
                    <input type="password" name="password" class="form-control rounded-3" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn w-100 py-3 mb-3 fw-bold text-white shadow-sm" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none; border-radius: 12px;">
                    Login to Dashboard
                </button>
            </form>
            
            <div class="text-center">
                <p class="text-muted small">Want to become a guide? <a href="{{ url_for('guide.register') }}" class="text-success text-decoration-none fw-bold">Apply Here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
